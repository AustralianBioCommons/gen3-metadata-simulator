# Publish to PyPI when a GitHub release is published (or run manually).
# Requires the PYPI_API_KEY repository secret.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry

      - name: Configure Poetry with the PyPI token
        run: poetry config pypi-token.pypi ${{ secrets.PYPI_API_KEY }}

      - name: Build and publish to PyPI
        run: poetry publish --build
